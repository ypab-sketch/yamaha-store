<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho | Yamaha Store</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="/imagens/yamahaicon.png">

</head>

<body>

    <header>

        <div class="logo">
            <a href="../index.html">
            <h1>
                <i class="fa-solid fa-motorcycle"></i>
                Yamaha Store
            </h1>
            </a>

        </div>

        <div class="menu">
        
        <span id="saldo-usuario"></span>
        
            <a href="favoritos.html">
                <button>
                    <i class="fa-regular fa-heart"></i>
                </button>
            </a>

            <a href="carrinho.html">
                <button>
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </a>


            <button>
                <i class="fa-solid fa-user"></i>
                Entrar
            </button>

        </div>

    </header>

    <main>

        <section class="produtos">

            <h2>
                <i class="fa-solid fa-cart-shopping"></i>
                Meu Carrinho
            </h2>

            <!-- AQUI O JS VAI RENDERIZAR OS PRODUTOS -->
            <div id="lista-carrinho"></div>

            <h3 id="total-carrinho">Total: R$ 0,00</h3>

            <button onclick="finalizarCompra()" class="btn-detalhes">
                Finalizar compra
            <button>

        </section>

    </main>

    <script src="../js/app.js"></script>
    

</body>

</html>
